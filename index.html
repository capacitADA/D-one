<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>D1 · CEDI Ibagué</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  /* ── RESET ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }

  /* ── VARIABLES ── */
  :root {
    --red: #E3051B;
    --red2: #b80416;
    --dark: #111318;
    --dark2: #1c2028;
    --dark3: #252b35;
    --surface: #ffffff;
    --surface2: #f4f5f7;
    --surface3: #ecedf0;
    --text: #111318;
    --text2: #4a5168;
    --text3: #8a91a8;
    --border: #e2e4ea;
    --border2: #c8cad4;
    --green: #16a34a;
    --green2: #dcfce7;
    --amber: #d97706;
    --amber2: #fef3c7;
    --blue: #2563eb;
    --blue2: #dbeafe;
    --radius: 12px;
    --radius-sm: 8px;
    --topbar-h: 56px;
    --botnav-h: 64px;
    --font: 'DM Sans', sans-serif;
    --font-display: 'Syne', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--surface2);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── TOPBAR ── */
  .topbar {
    height: var(--topbar-h);
    background: var(--dark);
    display: flex;
    align-items: center;
    padding: 0 1rem;
    gap: 0.75rem;
    flex-shrink: 0;
    z-index: 10;
    position: relative;
  }

  .topbar-logo {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .topbar-d1 {
    font-family: var(--font-display);
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--red);
    letter-spacing: -1px;
    line-height: 1;
  }

  .topbar-divider {
    width: 1px;
    height: 22px;
    background: #333;
  }

  .topbar-cedi {
    font-size: 0.7rem;
    color: #aaa;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    line-height: 1.3;
  }

  .topbar-cedi span {
    display: block;
    color: #fff;
    font-size: 0.75rem;
    font-weight: 600;
  }

  .topbar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .topbar-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--red);
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }

  .topbar-name {
    font-size: 0.72rem;
    color: #ccc;
    font-weight: 500;
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .topbar-salir {
    background: none;
    border: 1px solid #333;
    color: #aaa;
    font-size: 0.65rem;
    padding: 3px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font);
  }

  /* ── MAIN CONTENT ── */
  #mainContent {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding-bottom: calc(var(--botnav-h) + 8px);
  }

  /* ── BOTTOM NAV ── */
  .botnav {
    height: var(--botnav-h);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: stretch;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .bni {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 0.6rem;
    font-family: var(--font);
    font-weight: 500;
    transition: color 0.15s;
    padding: 0 2px;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }

  .bni .nav-icon {
    font-size: 1.2rem;
    line-height: 1;
  }

  .bni.active {
    color: var(--red);
  }

  .bni.active::after {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 2px;
    background: var(--red);
    border-radius: 0 0 4px 4px;
  }

  /* ── PAGE ── */
  .page {
    padding: 1rem;
    max-width: 600px;
    margin: 0 auto;
  }

  /* ── LOADING ── */
  .loading-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 1rem;
    color: var(--text3);
  }

  .loading-spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SECTION HEADER ── */
  .sec-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.85rem;
  }

  .sec-head h2 {
    font-family: var(--font-display);
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text);
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    margin-bottom: 0.75rem;
  }

  .card-title {
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--text);
    margin-bottom: 2px;
  }

  .card-meta {
    font-size: 0.78rem;
    color: var(--text2);
    margin-bottom: 2px;
  }

  .card-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 0.6rem;
  }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    font-family: var(--font);
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
    text-decoration: none;
  }

  .btn:active { transform: scale(0.97); }

  .btn-red { background: var(--red); color: white; }
  .btn-red:hover { background: var(--red2); }
  .btn-dark { background: var(--dark); color: white; }
  .btn-dark:hover { background: var(--dark2); }
  .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface3); }
  .btn-green { background: var(--green); color: white; }
  .btn-sm { padding: 5px 10px; font-size: 0.75rem; }
  .btn-full { width: 100%; justify-content: center; }
  .btn-wa { background: #25D366; color: white; }

  /* ── SEARCH ── */
  .search {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: var(--font);
    font-size: 0.9rem;
    background: var(--surface);
    color: var(--text);
    margin-bottom: 0.85rem;
    outline: none;
  }

  .search:focus { border-color: var(--red); }

  /* ── BADGE ── */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 100px;
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .b-red { background: #fde8ea; color: #c0020f; }
  .b-green { background: var(--green2); color: #15803d; }
  .b-blue { background: var(--blue2); color: #1d4ed8; }
  .b-amber { background: var(--amber2); color: #92400e; }
  .b-gray { background: var(--surface3); color: var(--text2); }

  /* ── PANEL STATS ── */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.85rem 1rem;
  }

  .stat-val {
    font-family: var(--font-display);
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }

  .stat-val.red { color: var(--red); }

  .stat-label {
    font-size: 0.72rem;
    color: var(--text3);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-top: 4px;
  }

  /* ── PANEL HERO ── */
  .hero {
    background: var(--dark);
    border-radius: var(--radius);
    padding: 1.2rem;
    margin-bottom: 1rem;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: 'D1';
    position: absolute;
    right: -10px;
    bottom: -20px;
    font-family: var(--font-display);
    font-size: 7rem;
    font-weight: 800;
    color: rgba(255,255,255,0.04);
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }

  .hero-label {
    font-size: 0.68rem;
    color: var(--red);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .hero-title {
    font-family: var(--font-display);
    font-size: 1.3rem;
    font-weight: 800;
    color: white;
    line-height: 1.2;
  }

  .hero-sub {
    font-size: 0.78rem;
    color: #888;
    margin-top: 6px;
  }

  /* ── FORM ── */
  .fi {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: var(--font);
    font-size: 0.88rem;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color 0.15s;
  }

  .fi:focus { border-color: var(--red); }

  select.fi { cursor: pointer; }

  .fl {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 4px;
    margin-top: 10px;
  }

  .fr {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  /* ── MODAL ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
  }

  .overlay.hidden { display: none; }

  .modal {
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
  }

  .modal-wide { max-height: 95vh; }

  .modal-h {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.85rem 1rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .modal-h h3 {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
  }

  .xbtn {
    background: var(--surface2);
    border: none;
    border-radius: 50%;
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--text2);
    display: flex; align-items: center; justify-content: center;
  }

  .modal-b {
    padding: 0.85rem 1rem;
    overflow-y: auto;
    flex: 1;
  }

  .modal-foot {
    display: flex;
    gap: 8px;
    padding-top: 0.75rem;
    margin-top: 0.5rem;
    border-top: 1px solid var(--border);
  }

  .modal-foot .btn { flex: 1; justify-content: center; }

  /* ── LOGIN PIN ── */
  .pin-display {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 1rem 0;
  }

  .pin-digit {
    width: 44px; height: 52px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
    background: var(--surface2);
    transition: border-color 0.15s;
  }

  .pin-digit.active { border-color: var(--red); background: #fff5f5; }
  .pin-digit.filled { border-color: var(--green); background: var(--green2); color: var(--green); }

  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin: 0.5rem 0;
  }

  .num-btn {
    height: 52px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    font-weight: 600;
    border-radius: var(--radius-sm);
    background: var(--surface2);
    border: 1px solid var(--border);
    cursor: pointer;
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    transition: background 0.1s;
  }

  .num-btn:active { background: var(--border); }
  .num-btn.del { color: var(--amber); }
  .num-btn.ok { background: var(--green); color: white; border-color: var(--green); }
  .num-btn.zero { grid-column: 2; }

  .login-warn { background: var(--amber2); color: var(--amber); padding: 8px; border-radius: 6px; font-size: 0.8rem; margin-top: 8px; }
  .login-error { background: #fde8ea; color: var(--red); padding: 8px; border-radius: 6px; font-size: 0.8rem; margin-top: 8px; }

  /* ── EQUIPO CHIPS ── */
  .chip {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 0.7rem;
    font-weight: 600;
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
    margin: 2px;
  }

  /* ── AGENDA TABLE ── */
  .tbl-wrap {
    overflow-x: auto;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }

  th {
    padding: 10px 12px;
    text-align: left;
    background: var(--surface2);
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  /* ── TOAST ── */
  #toastEl {
    position: fixed;
    bottom: calc(var(--botnav-h) + 1rem);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--dark);
    color: white;
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 0.82rem;
    font-weight: 500;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    white-space: nowrap;
    max-width: 90vw;
    text-overflow: ellipsis;
    overflow: hidden;
  }

  #toastEl.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── DETAIL HEADER ── */
  .det-hdr {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }

  .back {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 12px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    color: var(--text2);
    font-family: var(--font);
    white-space: nowrap;
  }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 2.5rem 1rem;
    color: var(--text3);
    font-size: 0.88rem;
  }

  .empty-icon {
    font-size: 2.5rem;
    margin-bottom: 0.75rem;
  }

  /* ── REGIONAL BADGE ── */
  .regional-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 0.7rem;
    font-weight: 700;
    background: var(--dark);
    color: white;
  }

  /* ── ACTIVIDAD ITEM ── */
  .act-item {
    display: flex;
    gap: 0.75rem;
    padding: 0.7rem 0;
    border-bottom: 1px solid var(--border);
  }

  .act-item:last-child { border-bottom: none; }

  .act-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }

  .act-dot.red { background: var(--red); }
  .act-dot.green { background: var(--green); }
  .act-dot.amber { background: var(--amber); }
  .act-dot.blue { background: var(--blue); }

  /* ── TECNICO ROL BADGE ── */
  .rol-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.66rem;
    font-weight: 700;
    text-transform: uppercase;
  }

  .rol-coord { background: #fde8ea; color: var(--red2); }
  .rol-tec { background: var(--blue2); color: #1d4ed8; }
  .rol-admin { background: var(--dark); color: white; }

  /* ── FOTO THUMB ── */
  .foto-strip {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .fthumb {
    width: 64px; height: 64px;
    object-fit: cover;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    cursor: pointer;
  }

  .foto-upload-btn {
    width: 64px; height: 64px;
    border: 2px dashed var(--border2);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    cursor: pointer;
    color: var(--text3);
    background: var(--surface2);
    position: relative;
  }

  .foto-upload-btn input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  /* ── TIENDAS EMPTY ── */
  .coming-soon {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 55vh;
    color: var(--text3);
    gap: 0.75rem;
    text-align: center;
    padding: 2rem;
  }

  .cs-icon {
    font-size: 3.5rem;
    opacity: 0.4;
  }

  .cs-title {
    font-family: var(--font-display);
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text2);
  }

  /* ── CEDI PAGE ── */
  .cedi-hero {
    background: var(--dark);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 0.85rem;
    position: relative;
    overflow: hidden;
  }

  .cedi-hero::after {
    content: 'CEDI';
    position: absolute;
    right: -8px;
    bottom: -12px;
    font-family: var(--font-display);
    font-size: 4rem;
    font-weight: 800;
    color: rgba(255,255,255,0.04);
    line-height: 1;
    pointer-events: none;
  }

  .cedi-name {
    font-family: var(--font-display);
    font-size: 1.4rem;
    font-weight: 800;
    color: white;
  }

  .cedi-loc {
    font-size: 0.78rem;
    color: var(--red);
    font-weight: 600;
    margin-top: 4px;
  }

  .cedi-info {
    font-size: 0.78rem;
    color: #888;
    margin-top: 2px;
  }

  .cedi-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--red);
    color: white;
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 0.68rem;
    font-weight: 700;
    margin-top: 10px;
  }

  /* ── REGIONAL FIELD ── */
  .regional-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.65rem 0.85rem;
    margin-bottom: 6px;
  }

  .regional-num {
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--red);
    min-width: 28px;
  }

  .regional-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }

  .regional-sub {
    font-size: 0.72rem;
    color: var(--text3);
  }

  /* ── AGENDA ── */
  .agenda-mes {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text3);
    padding: 0.5rem 0 0.25rem;
  }

  /* ── EQUIPO STATUS DOT ── */
  .eq-status {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
  }
