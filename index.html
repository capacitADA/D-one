<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Tema cambiado a rojo -->
    <meta name="theme-color" content="#b91c1c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>OLM Ingeniería SAS</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Sobrescribir todos los colores verdes por rojo */
        /* Colores originales: #0d4a3a (verde oscuro), #15803d (verde medio), #1d4ed8 (azul) se mantiene, pero cambiamos verdes */
        .topbar {
            background: #b91c1c !important;
        }
        .botnav .bni.active {
            color: #b91c1c !important;
            border-top-color: #b91c1c !important;
        }
        .botnav .bni.active .bni-ico {
            color: #b91c1c !important;
        }
        .btn-blue {
            background: #b91c1c !important;
        }
        .btn-blue:hover {
            background: #991b1b !important;
        }
        .gold-box, .anual-box, .mensual-box, .header-box {
            border-top-color: #b91c1c !important;
        }
        .badge.b-blue {
            background: #b91c1c !important;
        }
        .link-btn {
            color: #b91c1c !important;
        }
        .ec-btns .ab {
            border-color: #b91c1c !important;
            color: #b91c1c !important;
        }
        .ec-btns .ab:hover {
            background: #b91c1c !important;
            color: white !important;
        }
        .rec-btn {
            background: #b91c1c !important;
        }
        .btn-wa {
            background: #b91c1c !important;
        }
        .btn-wa:hover {
            background: #991b1b !important;
        }
        .modal-h {
            background: #b91c1c !important;
        }
        .info-box a.map-link {
            color: #b91c1c !important;
        }
        /* Cualquier otro elemento que pudiera tener verde */
        .topbar-rol-badge {
            background: #b91c1c !important;
        }
        .tc-rol-badge.rol-admin {
            background: #b91c1c !important;
        }
        .pin-digit.active {
            border-bottom-color: #b91c1c !important;
        }
        .num-btn.ok {
            background: #b91c1c !important;
        }
        .fotos-strip .fthumb {
            border-color: #b91c1c !important;
        }
        .si .badge.b-blue {
            background: #b91c1c !important;
        }
        .panel-box.header-box {
            background: #b91c1c !important;
        }
        /* Asegurar que ningún verde se cuele */
        :root {
            --gold: #b91c1c !important;
            --green: #b91c1c !important;
        }
    </style>
</head>
<body>
    <div class="app" id="appRoot">
        <div class="topbar" id="topbarEl">
            <div class="topbar-logo">
                <img src="OLM_LOGO.png" style="height:34px;border-radius:4px;" alt="OLM">
            </div>
            <div id="topbarRight" class="topbar-right">
                <span class="topbar-user" id="topbarUser">Sin sesión</span>
            </div>
        </div>
        <div class="main" id="mainContent">
            <div class="loading-screen">
                <div class="loading-spinner"></div>
                <p>Cargando...</p>
            </div>
        </div>
        <nav class="botnav" id="botnavEl">
            <button class="bni active" data-page="panel"><span class="bni-ico">📊</span><span class="bni-lbl">Panel</span></button>
            <!-- Cambiado "Clientes" por "CEDI" -->
            <button class="bni" data-page="clientes"><span class="bni-ico">👥</span><span class="bni-lbl">CEDI</span></button>
            <button class="bni" data-page="equipos"><span class="bni-ico">🔧</span><span class="bni-lbl">Activos</span></button>
            <button class="bni" data-page="servicios"><span class="bni-ico">📋</span><span class="bni-lbl">Servicios</span></button>
            <button class="bni" data-page="mantenimientos"><span class="bni-ico">📅</span><span class="bni-lbl">Agenda</span></button>
            <button class="bni" data-page="tecnicos"><span class="bni-ico">👨‍🔧</span><span class="bni-lbl">Técnicos</span></button>
        </nav>
    </div>
    <div class="overlay hidden" id="overlayEl"></div>
    <div class="toast" id="toastEl"></div>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
